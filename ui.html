<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
</head>
<body ng-controller="myC">
    
    <input type="text" name="name" ng-model="student.name">
    <input type="number" name="age" ng-model="student.age">
    <input type="button" value="Add Student" ng-click="addStudent()">

    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr ng-repeat="s in students">
            <td>{{s.name}}</td>
            <td>{{s.age}}</td>
        </tr>
    </table>


    <script>
        const app=angular.module("myApp", [])
        app.controller('myC', function($scope,$http){
            $scope.students=[]
            function loadData(){
                $http.get("/api/students").then(
                    (response)=>{
                        $scope.students=response.data
                    }
                ).catch((err)=>{ console.log(error)})
            }
            loadData()

            $scope.addStudent=()=>{
                $http.post("/api/students",{ name: $scope.student.name, age: $scope.student.age}).then(
                    ()=>{
                        $scope.student={}
                        loadData()
                    }
                )
            }

        })
    </script>
</body>
</html>
